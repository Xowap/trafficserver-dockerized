name: Build Docker Image

on:
    workflow_call:
        inputs:
            ref:
                required: true
                type: string
            base:
                required: true
                type: string
            tag:
                required: true
                type: string
            ats_version:
                required: false
                type: string
            go_version:
                required: false
                type: string
            llvm_version:
                required: false
                type: string
            quiche_version:
                required: false
                type: string
            nghttp3_version:
                required: false
                type: string
            ngtcp2_version:
                required: false
                type: string
            nghttp2_version:
                required: false
                type: string
            curl_version:
                required: false
                type: string
            ubuntu_version:
                required: false
                type: string

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                  ref: ${{ inputs.ref }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v3
              with:
                  push: true
                  platforms: linux/amd64,linux/arm64/v8
                  tags: xowap/trafficserver:${{ inputs.tag }}
                  build-args: |
                      BASE_IMAGE=${{ inputs.base }}
                      ATS_VERSION=${{ inputs.ats_version }}
                      GO_VERSION=${{ inputs.go_version }}
                      LLVM_VERSION=${{ inputs.llvm_version }}
                      QUICHE_VERSION=${{ inputs.quiche_version }}
                      NGHTTP3_VERSION=${{ inputs.nghttp3_version }}
                      NGTCP2_VERSION=${{ inputs.ngtcp2_version }}
                      NGHTTP2_VERSION=${{ inputs.nghttp2_version }}
                      CURL_VERSION=${{ inputs.curl_version }}
                      UBUNTU_VERSION=${{ inputs.ubuntu_version }}
