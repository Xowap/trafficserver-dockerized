name: Build Docker Image

on:
    workflow_call:
        inputs:
            ref:
                required: true
                type: string
            base:
                required: true
                type: string
            tag:
                required: true
                type: string
            ats_version:
                required: false
                type: string
            go_version:
                required: false
                type: string
            llvm_version:
                required: false
                type: string
            quiche_version:
                required: false
                type: string
            nghttp3_version:
                required: false
                type: string
            ngtcp2_version:
                required: false
                type: string
            nghttp2_version:
                required: false
                type: string
            curl_version:
                required: false
                type: string
            ubuntu_version:
                required: false
                type: string

jobs:
    build-native:
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                arch: [amd64, arm64]
                include:
                    - arch: amd64
                      runner: ubuntu-latest
                      suffix: -amd64
                    - arch: arm64
                      runner: ubuntu-24.04-arm64
                      suffix: -arm64
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                  ref: ${{ inputs.ref }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: Generate architecture suffix tags
              id: suffix-tags
              shell: bash
              run: |
                  IFS=',' read -ra ADDR <<< "${{ inputs.tag }}"
                  TAGS_WITH_SUFFIX=""
                  for t in "${ADDR[@]}"; do
                      if [ -n "$TAGS_WITH_SUFFIX" ]; then
                          TAGS_WITH_SUFFIX="${TAGS_WITH_SUFFIX},"
                      fi
                      TAGS_WITH_SUFFIX="${TAGS_WITH_SUFFIX}${t}${{ matrix.suffix }}"
                  done
                  echo "tags=${TAGS_WITH_SUFFIX}" >> $GITHUB_OUTPUT

            - name: Build and push native architecture image
              uses: docker/build-push-action@v3
              with:
                  push: true
                  tags: ${{ steps.suffix-tags.outputs.tags }}
                  cache-from: type=gha,scope=${{ inputs.tag }}-${{ inputs.base }}-${{ matrix.arch }}
                  cache-to: type=gha,mode=max,scope=${{ inputs.tag }}-${{ inputs.base }}-${{ matrix.arch }}
                  build-args: |
                      BASE_IMAGE=${{ inputs.base }}
                      ATS_VERSION=${{ inputs.ats_version }}
                      GO_VERSION=${{ inputs.go_version }}
                      LLVM_VERSION=${{ inputs.llvm_version }}
                      QUICHE_VERSION=${{ inputs.quiche_version }}
                      NGHTTP3_VERSION=${{ inputs.nghttp3_version }}
                      NGTCP2_VERSION=${{ inputs.ngtcp2_version }}
                      NGHTTP2_VERSION=${{ inputs.nghttp2_version }}
                      CURL_VERSION=${{ inputs.curl_version }}
                      UBUNTU_VERSION=${{ inputs.ubuntu_version }}

    merge-manifests:
        needs: build-native
        runs-on: ubuntu-latest
        steps:
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: Create and push multi-arch manifest
              shell: bash
              run: |
                  IFS=',' read -ra ADDR <<< "${{ inputs.tag }}"
                  for t in "${ADDR[@]}"; do
                      echo "Merging manifests for $t..."
                      docker buildx imagetools create -t "$t" "$t-amd64" "$t-arm64"
                  done
