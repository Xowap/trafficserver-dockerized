name: Release

on:
    workflow_dispatch:

jobs:
    build-image-default:
        uses: ./.github/workflows/build-image.yml
        with:
            ref: ${{ github.ref }}
            base: default
            tag: xowap/trafficserver:latest
        secrets: inherit

    build-image-no-hwloc:
        uses: ./.github/workflows/build-image.yml
        with:
            ref: ${{ github.ref }}
            base: no-hwloc
            tag: xowap/trafficserver:no-hwloc
        secrets: inherit
